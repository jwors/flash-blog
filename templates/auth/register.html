{% extends "base.html" %}

{% block title %}注册 - 我的博客{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header text-center">
                <h4><i class="bi bi-person-plus"></i> 用户注册</h4>
            </div>
            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-circle"></i> {{ error }}
                    </div>
                {% endif %}

                <form action="/auth/register" method="post">
                    <!-- 用户名 -->
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" id="username" name="username" class="form-control"
                               placeholder="请输入用户名（用于登录和显示）" required minlength="2">
                    </div>

                    <!-- 邮箱 -->
                    <div class="mb-3">
                        <label for="email" class="form-label">邮箱</label>
                        <input type="email" id="email" name="email" class="form-control"
                               placeholder="请输入邮箱地址" required>
                    </div>

                    <!-- 密码 -->
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" id="password" name="password" class="form-control"
                               placeholder="请输入密码（至少6位）" required minlength="6">
                    </div>

                    <!-- 确认密码 -->
                    <div class="mb-3">
                        <label for="password_confirm" class="form-label">确认密码</label>
                        <input type="password" id="password_confirm" name="password_confirm" class="form-control"
                               placeholder="请再次输入密码" required minlength="6">
                    </div>

                    <!-- 提交按钮 -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-person-plus"></i> 注册
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <p class="text-muted">
                        已有账号？
                        <a href="/auth/login">立即登录</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 密码确认验证
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password_confirm').value;
    if (password !== confirm) {
        e.preventDefault();
        alert('两次输入的密码不一致！');
    }
});
</script>
{% endblock %}
